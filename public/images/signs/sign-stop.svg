<svg width="400" height="350" viewBox="0 0 400 350" xmlns="http://www.w3.org/2000/svg">

  <!--
    Regular octagon, flat-side-on-top.
    Centre: (200, 175)  Circumradius: 155
    Vertices at angles 22.5°, 67.5°, 112.5° … 337.5° from 12-o'clock, clockwise.
    x = 200 + 155·sin(θ)   y = 175 − 155·cos(θ)
    Rounded to 1 dp:
      22.5° → 259.3,  31.8
      67.5° → 343.2, 115.7
     112.5° → 343.2, 234.3
     157.5° → 259.3, 318.2
     202.5° → 140.7, 318.2
     247.5° →  56.8, 234.3
     292.5° →  56.8, 115.7
     337.5° → 140.7,  31.8
  -->
  <polygon
    points="259.3,31.8 343.2,115.7 343.2,234.3 259.3,318.2 140.7,318.2 56.8,234.3 56.8,115.7 140.7,31.8"
    fill="#CC0000"
    stroke="#FFFFFF"
    stroke-width="18"
  />

  <!-- STOP text centred at (200, 175); y=192 offsets for font baseline -->
  <text
    x="200"
    y="207"
    font-size="100"
    font-weight="bold"
    text-anchor="middle"
    fill="#FFFFFF"
    font-family="Arial, Helvetica, sans-serif"
  >
    STOP
  </text>

</svg>
