<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

  <!--
    Inverted equilateral triangle (pointing DOWN) — base shape for Z 205 "Vorfahrt gewähren" (Yield).
    Circumradius R = 162, centre at (200, 198).
    Vertices at 90°, 210°, 330° from centre:
      Bottom:     (200.0, 360.0)   angle  90°   y = 198 + 162
      Top-left:   ( 59.7, 117.0)   angle 210°   x = 200 − 162·sin(60°), y = 198 − 162·0.5
      Top-right:  (340.3, 117.0)   angle 330°
    White fill, red border. Thin inner red line omitted (added as extra polygon on full sign).
  -->
  <polygon
    points="200,360 59.7,117 340.3,117"
    fill="#FFFFFF"
    stroke="#CC0000"
    stroke-width="22"
    stroke-linejoin="round"
  />

</svg>
