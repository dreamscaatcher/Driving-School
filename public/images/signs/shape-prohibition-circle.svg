<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

  <!--
    White circle with red border — base shape for German round Vorschriftzeichen.
    Used for: prohibition signs (Z 250–282) and speed limits (Z 274).
    Centre (200, 200), radius 175.
    Red border via stroke-width="22" (≈ 1/16 of diameter, matching standard proportions).
    White fill is the sign face — add number or symbol on top.
  -->
  <circle
    cx="200" cy="200" r="175"
    fill="#FFFFFF"
    stroke="#CC0000"
    stroke-width="22"
  />

</svg>
