<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

  <!--
    Solid blue circle — base shape for German Gebotszeichen (mandatory signs).
    Used for: Z 209 (prescribed direction), Z 237 (cycle path), Z 239 (footpath),
              Z 240 (shared path), Z 241 (segregated path), Z 244 (cycle street), etc.
    Centre (200, 200), radius 186.
    German mandatory-sign blue: #003FA0.
    White symbols are drawn on top of this circle.
  -->
  <circle
    cx="200" cy="200" r="186"
    fill="#003FA0"
  />

</svg>
